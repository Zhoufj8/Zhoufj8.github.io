  <script>
    const panel = document.getElementById('commandPanel');
    const openBtn = document.getElementById('openCommand');
    const input = document.getElementById('commandInput');
    const items = [...document.querySelectorAll('.command-item')];

    function openPanel() {
      panel.classList.add('active');
      setTimeout(() => input.focus(), 10);
    }

    function closePanel() {
      panel.classList.remove('active');
      input.value = '';
      filterItems('');
    }

    function filterItems(keyword) {
      const q = keyword.trim().toLowerCase();
      items.forEach((item) => {
        const text = item.innerText.toLowerCase();
        item.style.display = text.includes(q) ? 'flex' : 'none';
      });
    }

    openBtn.addEventListener('click', openPanel);

    panel.addEventListener('click', (e) => {
      if (e.target === panel) closePanel();
    });

    document.addEventListener('keydown', (e) => {
      if ((e.key === 'k' || e.key === 'K') && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        panel.classList.contains('active') ? closePanel() : openPanel();
      }
      if (e.key === 'Escape' && panel.classList.contains('active')) {
        closePanel();
      }
    });

    input.addEventListener('input', (e) => filterItems(e.target.value));

    items.forEach((item) => {
      item.addEventListener('click', () => {
        const target = document.querySelector(item.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        closePanel();
      });
    });
  </script>
